name: Privacy gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Scan public documentation release path
        run: python scripts/check_release_privacy.py docs

      - name: Scan canonical starter templates
        run: python scripts/check_release_privacy.py templates/canonical

      - name: Build and validate deterministic v0.1 candidate
        run: |
          python scripts/build_release_artifact.py \
            --version 0.1.0 \
            --output "$RUNNER_TEMP/byte-core-0.1.0"
          python scripts/check_v01_release.py \
            --artifact "$RUNNER_TEMP/byte-core-0.1.0" \
            --evidence release/v0.1/manual-evidence.json

      - name: Prove known release leakage is blocked
        shell: bash
        run: |
          mkdir -p build/privacy-known-leakage
          python -c "from pathlib import Path; Path('build/privacy-known-leakage/release.txt').write_text('password=' + 'synthetic-ci-fixture', encoding='utf-8')"
          set +e
          python scripts/check_release_privacy.py build/privacy-known-leakage
          gate_status=$?
          set -e
          if [ "$gate_status" -ne 1 ]; then
            echo "privacy gate did not reject the known fixture as expected"
            exit 1
          fi
